version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  UNIGOM Biométrie — Docker Compose stack
#  Services: db (PostgreSQL 16) · api (FastAPI) · nginx (reverse proxy)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: unigom_db
    environment:
      POSTGRES_DB: unigom_bio
      POSTGRES_USER: unigom
      POSTGRES_PASSWORD: ${DB_PASSWORD:-unigom_secret_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unigom -d unigom_bio"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend_net

  # ── FastAPI ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unigom_api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://unigom:${DB_PASSWORD:-unigom_secret_pass}@db:5432/unigom_bio
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - backend_net
      - frontend_net

  # ── Nginx reverse proxy ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: unigom_nginx
    ports:
      - "80:80"
      # - "443:443"   # Uncomment when SSL certs are mounted
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./certs:/etc/nginx/certs:ro   # SSL certs
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - frontend_net

volumes:
  postgres_data:
    driver: local

networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge
