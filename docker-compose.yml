version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  UNIGOM Biométrie — Docker Compose stack
#  Services: db (MySQL 8.0) · api (FastAPI) · nginx (reverse proxy)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── MySQL ──────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: unigom_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: rhunigom_presence_users
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend_net

  # ── FastAPI ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unigom_api
    env_file: .env
    environment:
      # presence DB – used for attendance records & lockout tracking
      DATABASE_URL: mysql+pymysql://root:${DB_PASSWORD:-password}@db:3306/rhunigom_presence?charset=utf8mb4
      # production HR database (read‑only).  point at the same container for
      # local testing; adjust as needed when you have a real prod server.
      DATABASE_PROD_URL: mysql+pymysql://root:${DB_PASSWORD:-password}@db:3306/rhunigom__database_production?charset=utf8mb4
      # alias to DATABASE_URL for backward compatibility; should be same host
      DATABASE_PRESENCE_URL: mysql+pymysql://root:${DB_PASSWORD:-password}@db:3306/rhunigom_presence?charset=utf8mb4
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
    depends_on:
      db:
        condition: service_healthy

    # IMPORTANT : expose + ports pour accès externe
    expose:
      - "8000"
      - "7660"        # allow EHome TCP push connections
    ports:
      - "8000:8000"
      - "7660:7660"   # map host port for EHome server

    restart: unless-stopped
    networks:
      - backend_net
      - frontend_net

  # ── Nginx reverse proxy ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: unigom_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - frontend_net

volumes:
  mysql_data:
    driver: local

networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge